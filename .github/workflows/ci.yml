name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      POSTGRES_DB: complaint_triage
      POSTGRES_USER: complaint_triage
      POSTGRES_PASSWORD: ci-disposable-only
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 55432
      RUN_POSTGRES_TESTS: "1"

    services:
      postgres:
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_DB: complaint_triage
          POSTGRES_USER: complaint_triage
          POSTGRES_PASSWORD: ci-disposable-only
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U complaint_triage -d complaint_triage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Test
        run: python -m pytest --cov=complaint_triage --cov-report=term-missing --cov-report=xml
